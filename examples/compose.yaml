---
services:
  db:
    image: postgres:18.4-alpine
    environment:
      - POSTGRES_PASSWORD=postgres
    volumes:
      - pgdata:/var/lib/postgresql

  app:
    build:
      context: ..
      dockerfile: examples/Dockerfile
    depends_on:
      - db
    restart: on-failure
    environment:
      - PGHOST=db
      - PGPORT=5432
      - PGUSER=postgres
      - PGPASSWORD=postgres
      - PGDATABASE=postgres
    ports:
      - "8000:8000"
    volumes:
      # Live source: edits reload automatically (the dev server watches both).
      - ./app.py:/app/app.py
      - ../django_absurd:/src/django_absurd

  worker:
    build:
      context: ..
      dockerfile: examples/Dockerfile
    # Long-lived blocking worker consuming "default". On start it reconciles the
    # queue (creating it + indexing the admin views on first run).
    command: nanodjango manage app.py absurd_worker
    depends_on:
      - app
    restart: on-failure
    environment:
      - PGHOST=db
      - PGPORT=5432
      - PGUSER=postgres
      - PGPASSWORD=postgres
      - PGDATABASE=postgres
    volumes:
      # Live source. Note: the worker does not auto-reload — restart it
      # (docker compose restart worker) to pick up code changes.
      - ./app.py:/app/app.py
      - ../django_absurd:/src/django_absurd

volumes:
  pgdata:
