---
services:
  db:
    image: postgres:18.4-alpine
    environment:
      - POSTGRES_PASSWORD=postgres
    # No host port — app and worker reach Postgres over the compose network (db:5432).
    volumes:
      # PG18+ stores data under /var/lib/postgresql (a major-version subdir), not /data.
      - pgdata:/var/lib/postgresql

  app:
    build:
      context: ..
      dockerfile: examples/Dockerfile
    depends_on:
      - db
    # No healthcheck: on first boot Postgres may not be ready yet (or, for the worker,
    # the schema not migrated) — the container exits and is restarted until it succeeds.
    restart: on-failure
    environment:
      - PGHOST=db
      - PGPORT=5432
      - PGUSER=postgres
      - PGPASSWORD=postgres
      - PGDATABASE=postgres
    ports:
      # The only published port — open http://localhost:8000/ and /admin/.
      - "8000:8000"

  worker:
    build:
      context: ..
      dockerfile: examples/Dockerfile
    # Long-lived blocking worker consuming "default". On start it reconciles the
    # queue (creating it + indexing the admin views on first run).
    command: nanodjango manage app.py absurd_worker
    depends_on:
      - app
    restart: on-failure
    environment:
      - PGHOST=db
      - PGPORT=5432
      - PGUSER=postgres
      - PGPASSWORD=postgres
      - PGDATABASE=postgres

volumes:
  pgdata:
