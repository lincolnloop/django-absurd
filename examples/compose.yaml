---
services:
  db:
    # pg_cron-enabled Postgres: the Debian-based image with the pg_cron package.
    # Alpine has no pg_cron package, so we use the Debian variant here.
    build:
      context: ..
      dockerfile: Dockerfile.pgcron
    # shared_preload_libraries loads pg_cron; cron.database_name tells pg_cron
    # which database to install itself in (must match PGDATABASE below).
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_cron
      - -c
      - cron.database_name=postgres
    environment:
      - POSTGRES_PASSWORD=postgres
    volumes:
      - pgdata:/var/lib/postgresql
      # initdb.d script installs pg_cron on first start (runs as superuser,
      # before any Django migrations run). This is the operator-side step that
      # django-absurd does not ship — each project installs its own extension.
      - ./initdb.d:/docker-entrypoint-initdb.d

  app:
    build:
      context: ..
      dockerfile: examples/Dockerfile
    depends_on:
      - db
    restart: on-failure
    environment:
      - PGHOST=db
      - PGPORT=5432
      - PGUSER=postgres
      - PGPASSWORD=postgres
      - PGDATABASE=postgres
    ports:
      - "8000:8000"
    volumes:
      # Live source: edits reload automatically (the dev server watches both).
      - ./app.py:/app/app.py
      - ../django_absurd:/src/django_absurd

  worker:
    build:
      context: ..
      dockerfile: examples/Dockerfile
    # Long-lived blocking worker consuming "default". On start it reconciles
    # the queue (creating it + indexing the admin views on first run).
    # With SCHEDULER="pg_cron", the beat is disabled — pg_cron fires the
    # schedule directly from Postgres. Watch the worker logs for "pong" once
    # a minute (after pg_cron fires the wrapper function and the worker drains
    # the resulting task).
    command: nanodjango manage app.py absurd_worker
    depends_on:
      - app
    restart: on-failure
    environment:
      - PGHOST=db
      - PGPORT=5432
      - PGUSER=postgres
      - PGPASSWORD=postgres
      - PGDATABASE=postgres
    volumes:
      # Live source. Note: the worker does not auto-reload — restart it
      # (docker compose restart worker) to pick up code changes.
      - ./app.py:/app/app.py
      - ../django_absurd:/src/django_absurd

volumes:
  pgdata:
