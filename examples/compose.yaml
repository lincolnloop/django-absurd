---
services:
  db:
    # pg_cron-enabled Postgres (Debian image + the PGDG pg_cron package).
    # Reuses the repo-root Dockerfile.pg_cron also used by the test suite.
    build:
      context: ..
      dockerfile: Dockerfile.pg_cron
    # shared_preload_libraries loads pg_cron at server start (a GUC, set BEFORE
    # any CREATE EXTENSION — it cannot be enabled by a migration). cron.database_name
    # points pg_cron at the app's database (must match PGDATABASE below), so the
    # extension can be created there and jobs run against it.
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_cron
      - -c
      - cron.database_name=demo
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=demo
    volumes:
      - pgdata:/var/lib/postgresql

  # One-shot: apply migrations. The 0001_pg_cron migration runs CreateExtension
  # (as the superuser `postgres` role), then django-absurd's post_migrate handler
  # reconciles the SCHEDULE into a pg_cron job. Extension-first ordering holds
  # because post_migrate fires after all migrations. Exits when done.
  migrate:
    build:
      context: ..
      dockerfile: examples/Dockerfile
    command: python manage.py migrate
    depends_on:
      - db
    restart: on-failure
    environment: &django-env
      - PGHOST=db
      - PGPORT=5432
      - PGUSER=postgres
      - PGPASSWORD=postgres
      - PGDATABASE=demo
    volumes: &source-mounts
      # Live source (django-layout dev style): edits are picked up without a
      # rebuild. The example project and the django_absurd package are both
      # bind-mounted over their in-image copies.
      - ./:/app
      - ../django_absurd:/src/django_absurd

  # Long-lived worker consuming the "default" queue. With SCHEDULER="pg_cron"
  # there is no beat: pg_cron fires `ping` every minute, and the worker drains
  # the resulting task and logs "pong 🏓".
  worker:
    build:
      context: ..
      dockerfile: examples/Dockerfile
    command: python manage.py absurd_worker --alias default --queue default
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: on-failure
    environment: *django-env
    volumes: *source-mounts

  # Long-lived beat+worker co-located for the "beat" backend. The beat process
  # fires `tick` every minute; the worker drains it and logs "tock ⏰".
  beatworker:
    build:
      context: ..
      dockerfile: examples/Dockerfile
    command: python manage.py absurd_worker --alias beat --queue beat --beat
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: on-failure
    environment: *django-env
    volumes: *source-mounts

volumes:
  pgdata:
