---
services:
  db:
    # Upgrading the DB image requires `docker compose down -v` first — the image
    # moved alpine (musl) → debian (glibc) and reusing an alpine-initialized
    # pgdata volume under glibc risks collation/index corruption.
    build:
      context: .
      dockerfile: Dockerfile.pg_cron
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_cron
      - -c
      - cron.database_name=absurd_test
    environment:
      - POSTGRES_PASSWORD=postgres
    ports:
      - "${PGPORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql

volumes:
  pgdata:
