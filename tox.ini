[tox]
requires =
    tox>=4.22
    tox-uv>=1.16
env_list =
    py3{12,13,14}-django60
    dev
    py312-django60-mypy
    py314-django60-mypy

[testenv]
runner = uv-venv-runner
dependency_groups = dev
deps =
    django60: django>=6.0,<6.1
uv_resolution =
    py312: lowest-direct
    py3{13,14}: highest
pass_env = PG*
commands =
    # The matrix skips `packaging`-marked tests (they build the dist and need the
    # build backend); the `dev` env below runs the full suite including them.
    !mypy: pytest -m "not packaging" {posargs}
    !mypy: pytest tests/multidb {posargs}
    mypy: mypy .

[testenv:dev]
runner = uv-venv-lock-runner
commands =
    pytest {posargs}
    pytest tests/multidb {posargs}
