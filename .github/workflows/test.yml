---
name: test

"on":
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read # to fetch code (actions/checkout)

concurrency:
  # Abort pending builds if there's an update.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tox:
    name: ${{ matrix.env }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env:
          - py312-django60
          - py313-django60
          - py314-django60
          - dev
          - py312-django60-mypy
          - py314-django60-mypy
    env:
      PGHOST: localhost
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: postgres
      PGPORT: "5432"
      PGPORT_PGCRON: "5434"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Start Postgres services
        run: docker compose up -d --build --wait db db_pg_cron
      - name: Run tox
        run: uvx --with tox-uv tox -e "${{ matrix.env }}"
      - name: Upload coverage to Codecov
        if: ${{ (success() || failure()) && !contains(matrix.env, 'mypy') }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: ${{ matrix.env }}
          fail_ci_if_error: true
      - name: Upload test results to Codecov
        if: ${{ (success() || failure()) && !contains(matrix.env, 'mypy') }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          flags: ${{ matrix.env }}
          fail_ci_if_error: true
          files: junit-core.xml,junit-pg_cron.xml,junit-multidb.xml

  build:
    name: build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0 # full history + tags so setuptools-scm can derive the version
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Build sdist + wheel
        run: uv build
      - name: Check distribution metadata
        run: uvx twine check --strict dist/*
