---
name: test

"on":
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read # to fetch code (actions/checkout)

concurrency:
  # Abort pending builds if there's an update.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tox:
    name: ${{ matrix.env }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env:
          - py312-django60
          - py313-django60
          - py314-django60
          - dev
          - py312-django60-mypy
          - py314-django60-mypy
    env:
      PGHOST: localhost
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: postgres
      PGPORT: "5432"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Start pg_cron Postgres
        run: docker compose up -d --build db
      - name: Wait for Postgres
        run: |
          for _ in $(seq 1 30); do
            if docker compose exec -T db pg_isready -U postgres; then exit 0; fi
            sleep 1
          done
          echo "Postgres did not become ready" >&2
          exit 1
      - name: Run tox
        run: uvx --with tox-uv tox -e "${{ matrix.env }}"
      - name: Upload coverage to Codecov
        if: ${{ (success() || failure()) && !contains(matrix.env, 'mypy') }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: ${{ matrix.env }}
          fail_ci_if_error: true
      - name: Upload test results to Codecov
        if: ${{ (success() || failure()) && !contains(matrix.env, 'mypy') }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          flags: ${{ matrix.env }}
          fail_ci_if_error: true

  build:
    name: build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0 # full history + tags so setuptools-scm can derive the version
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Build sdist + wheel
        run: uv build
      - name: Check distribution metadata
        run: uvx twine check --strict dist/*
